name: Build and Deploy ChatApp

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, chatapp]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # .env faylı serverdə saxlanılır — GitHub Secrets istifadə etmirik
      - name: Copy .env from server
        run: cp /home/yusif/talkbit/talkbit/.env .env

      - name: Stop existing containers
        run: docker compose down --remove-orphans
        continue-on-error: true

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 30
          docker compose ps

      - name: Verify deployment
        run: |
          curl -sf http://localhost:80 || echo "Frontend not ready yet"
          curl -sf http://localhost:80/api/health || echo "Backend not ready yet"

      - name: Clean up old Docker resources
        run: |
          docker builder prune -af
          docker image prune -af
        if: always()
