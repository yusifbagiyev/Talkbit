services:
  # ── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: talkbit_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talkbit-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: talkbit_redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - talkbit-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────
  backend:
    build:
      context: .
      dockerfile: ChatApp.Api/Dockerfile
    container_name: talkbit_backend
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      FileStorage__LocalPath: ${FILE_STORAGE_PATH}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      EncryptionSettings__Key: ${ENCRYPTION_KEY}
      ApiBaseUrl: ${API_BASE_URL}
    volumes:
      - uploads_data:${FILE_STORAGE_PATH}
    networks:
      - talkbit-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──────────────────────────────
  frontend:
    build:
      context: ./chatapp-frontend
      dockerfile: Dockerfile
    container_name: talkbit_frontend
    networks:
      - talkbit-net
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: talkbit_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - talkbit-net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Prometheus ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: talkbit_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - talkbit-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: talkbit_grafana
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - talkbit-net
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ── Node Exporter ─────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: talkbit_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - talkbit-net
    restart: unless-stopped

  # ── cAdvisor ──────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: talkbit_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "-port=8081"
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - talkbit-net
    restart: unless-stopped

  # ── Loki ──────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: talkbit_loki
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - talkbit-net
    restart: unless-stopped

  # ── Promtail ──────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: talkbit_promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - talkbit-net
    depends_on:
      - loki
    restart: unless-stopped

networks:
  talkbit-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  loki_data:
